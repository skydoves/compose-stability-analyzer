name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '*' ]

jobs:
  lint:
    name: Spotless check
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      # The sample app's build script uses Gradle-plugin DSL from this branch (e.g. traceAll),
      # so the locally-built plugin must shadow the older published release in Maven Local
      # before any task that configures :app. Configuration-on-demand keeps :app itself from
      # being configured during this targeted publish.
      - name: Publish Gradle plugin to Maven Local
        run: ./gradlew :stability-gradle:publishToMavenLocal -x test -PRELEASE_SIGNING_ENABLED=false
      - name: spotless
        run: ./gradlew spotlessCheck

  api_check:
    name: API check
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      # See the Spotless job for why the plugin is published to Maven Local first.
      - name: Publish Gradle plugin to Maven Local
        run: ./gradlew :stability-gradle:publishToMavenLocal -x test -PRELEASE_SIGNING_ENABLED=false
      - name: API check
        run: ./gradlew apiCheck

  build:
    name: Build and Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Cache Gradle and wrapper
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # See the Spotless job for why the plugin is published to Maven Local first.
      - name: Publish Gradle plugin to Maven Local
        run: ./gradlew :stability-gradle:publishToMavenLocal -x test -PRELEASE_SIGNING_ENABLED=false

      - name: Build with Gradle
        run: |
          ./gradlew --scan --stacktrace \
              assemble -x :app:assemble

      - name: Run unit tests
        run: |
          ./gradlew --scan --stacktrace \
              :stability-compiler:test
